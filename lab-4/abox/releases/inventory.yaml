# Agentregistry-inventory ("Inventory") — the Control Plane for AI Infrastructure.
# Public, read-only HTTP API at /v0/{agents,servers,skills} enumerates the AI
# resources the lab cluster sees (kagent BYO agents, MCP servers, etc.).
#
# Upstream Helm chart is published as an OCI artifact at
# oci://ghcr.io/den-vasyliev/charts/agentregistry (see
# https://github.com/den-vasyliev/agentregistry-inventory .github/workflows/helm-release.yml).
# Chart version 0.5.16 corresponds to upstream release tag v0.5.18 — the chart
# version bumps independently of the repo's git tags.
#
# Ports the upstream Pod exposes (per chart values.yaml):
#   :8080  httpApi.port      — public HTTP API (incl. /v0/* and /ui/*)
#   :8081  controller.metricsAddr
#   :8082  controller.probeAddr
#   :8083  httpApi.mcpPort   — embedded MCP server
# Only :8080 is routed through agentgateway; everything else stays cluster-internal.
#
# `disableAuth: true` is the chart default — the /v0/* API is open. Suitable
# for a single-tenant lab; do not copy this setting to production.
apiVersion: v1
kind: Namespace
metadata:
  name: agentregistry
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: agentregistry
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/den-vasyliev/charts/agentregistry
  ref:
    tag: "0.5.16"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: inventory
  namespace: agentregistry
spec:
  interval: 1h
  releaseName: inventory
  # gateway-api-crds provides the HTTPRoute/ReferenceGrant types this release
  # uses. Without this dependsOn the kustomization can reconcile the route
  # before the CRDs exist.
  dependsOn:
    - name: gateway-api-crds
      namespace: flux-system
  chartRef:
    kind: OCIRepository
    name: agentregistry
    namespace: flux-system
  install:
    createNamespace: false   # Namespace is declared above; HelmRelease must not race it.
  values:
    image:
      # Pin the controller image tag explicitly — never trust upstream "latest".
      # The chart (0.5.16) and image versioning are decoupled: chart Chart.yaml
      # `appVersion: 0.5.16` does NOT correspond to any pushed image tag.
      # Upstream's CI (`make push` → `ko build --tags=$VERSION,latest`) only
      # produces clean-semver image tags on release-tag builds; the last such
      # tag in GHCR is `0.5.4`. Everything newer is `vX.Y.Z-<sha>-<timestamp>`.
      # Pin to 0.5.4 (chart's image-shape contract holds — only the tag default
      # is stale).
      repository: ghcr.io/den-vasyliev/agentregistry-inventory
      tag: "0.5.4"
      pullPolicy: IfNotPresent
    httpApi:
      port: 8080
      mcpPort: 8083
      serviceType: ClusterIP
    # Upstream ships its own HTTPRoute template (httpRoute.enabled). We craft
    # our own route below so we can pin the prefix `/inventory` and the rewrite
    # filter; keep the templated one off to avoid a duplicate.
    httpRoute:
      enabled: false
    # Default disableAuth: true is fine for the lab (single-tenant, gateway-
    # facing). Explicit here so the intent is reviewable.
    disableAuth: true
---
# Cross-namespace HTTPRoute → Service grant. Mirrors releases/kagent.yaml so
# the abox idiom is consistent: each app namespace ships its own ReferenceGrant.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: inventory
  namespace: agentregistry
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: agentregistry
  to:
  - group: ""
    kind: Service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: inventory
  namespace: agentregistry
spec:
  parentRefs:
  - name: agentgateway-external
    namespace: agentgateway-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /inventory
    # Service-side paths are rooted at `/` (e.g. /v0/agents). Strip the
    # gateway-side prefix so `/inventory/v0/agents` reaches the controller as
    # `/v0/agents`. If the embedded UI's absolute paths (`/ui/...`) end up
    # broken under this rewrite, drop the filter and serve the UI on a
    # dedicated hostname instead — JSON API verification (Phase 8) only
    # depends on /v0/* which works either way.
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    # Service name derives from Helm fullname template:
    #   {releaseName}-{chartName} → inventory-agentregistry
    # The chart's service.yaml suffixes "-api" for the HTTP/MCP service.
    # Port 8080 only — :8081 (metrics), :8082 (probes), :8083 (MCP) stay
    # cluster-internal per spec.
    - name: inventory-agentregistry-api
      port: 8080
