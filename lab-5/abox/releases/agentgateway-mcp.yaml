# MCP data plane on top of the existing agentgateway-external Gateway.
#
# Single target (`time`). agentgateway namespaces tool names with the target
# prefix only when there is more than one target in `targets[]`, so dropping
# back to one target keeps the surfaced names un-prefixed
# (e.g. `get_current_time` rather than `time_get_current_time`) and lets the
# agent's tool_filter / system prompt reference the bare MCP tool names.
#
# If we need to re-add a public MCP server (DeepWiki etc.) without breaking
# the agent, do it under a *separate* AgentgatewayBackend + HTTPRoute (e.g.
# /mcp/deepwiki) instead of adding it back into this `targets[]` list — that
# preserves the single-target invariant and keeps tool names stable.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: mcp
  namespace: agentgateway-system
spec:
  mcp:
    # Stateful pins each session to one target replica; harmless with a
    # single target and required if we ever scale `time-mcp` past one
    # replica (FastMCP keeps per-session state).
    sessionRouting: Stateful
    targets:
    - name: time
      static:
        # In-cluster MCPServer provisioned by releases/time-mcp-server.yaml.
        # The kmcp controller creates Service `time-mcp` in `kagent` listening
        # on port 3000; the FastMCP server serves StreamableHTTP at `/mcp`,
        # which is the agentgateway default path for this protocol — no
        # `path` override needed. No TLS: in-cluster plaintext.
        host: time-mcp.kagent.svc.cluster.local
        port: 3000
        protocol: StreamableHTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-router
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-external
    sectionName: http
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /mcp
    backendRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: mcp
