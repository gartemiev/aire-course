# Arize Phoenix as the in-cluster trace backend for lab-5.
#
# Source: oci://registry-1.docker.io/arizephoenix/phoenix-helm
# Pinned to 7.0.11 — confirmed published 2026-05-19 on Docker Hub.
# Bumping the version is a normal OpenSpec change (not a silent float).
#
# The chart bundles Postgres (via a sub-chart) and exposes:
#   - 6006 — Phoenix UI **and** OTLP/HTTP trace ingestion (combined port)
#   - 4317 — OTLP/gRPC trace ingestion
# The rendered Service is named `<release>-svc` (the chart hardcodes the
# `-svc` suffix in templates/_helpers.tpl), so the HTTPRoute and the OTel
# collector exporter both target `phoenix-svc.observability.svc.cluster.local`.
#
# Auth is disabled — this is a local KinD lab; the gateway has no auth either,
# and disabling Phoenix auth keeps the `/v1/projects/.../spans` REST API
# usable from the integration test without juggling tokens.
#
# Reset Phoenix data:
#   kubectl delete pvc -n observability -l app.kubernetes.io/instance=phoenix
apiVersion: v1
kind: Namespace
metadata:
  name: observability
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: phoenix
  namespace: flux-system
spec:
  interval: 1h
  url: oci://registry-1.docker.io/arizephoenix/phoenix-helm
  ref:
    tag: "7.0.11"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: phoenix
  namespace: observability
spec:
  interval: 1h
  releaseName: phoenix
  chartRef:
    kind: OCIRepository
    name: phoenix
    namespace: flux-system
  install:
    createNamespace: true
  # Phoenix + bundled Postgres pull large images on first reconcile;
  # KinD on Apple Silicon can take a while.
  timeout: 15m
  values:
    # Pull the Phoenix UI on ClusterIP — external access is via the
    # agentgateway HTTPRoute below.
    service:
      type: ClusterIP
    # Phoenix is mounted under /phoenix by the HTTPRoute below. Without
    # this, the React UI emits asset URLs at /assets/* (root-relative) and
    # the browser 404s every JS/CSS bundle — symptom is a blank white page.
    # Maps to PHOENIX_HOST_ROOT_PATH; the chart prepends it to UI + API.
    server:
      hostRootPath: /phoenix
    # Disable Phoenix's built-in auth: simpler local UX, and the REST
    # API the integration test polls (/v1/projects/.../spans) becomes
    # token-free. Re-enable for any cluster reachable from outside KinD.
    auth:
      enableAuth: false
    # Bundled Postgres sub-chart (defaults are fine: 20Gi PVC on the
    # cluster's default StorageClass, postgres/postgres credentials).
    postgresql:
      enabled: true
---
# Allow the HTTPRoute living in agentgateway-system to reference Services
# in the observability namespace. Mirrors the kagent ReferenceGrant in
# releases/kagent.yaml.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: phoenix
  namespace: observability
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: agentgateway-system
  to:
    - group: ""
      kind: Service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: phoenix
  namespace: observability
spec:
  parentRefs:
    - name: agentgateway-external
      namespace: agentgateway-system
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /phoenix
      # PHOENIX_HOST_ROOT_PATH follows the FastAPI/Starlette `root_path`
      # convention: Phoenix emits URLs prefixed with /phoenix but its own
      # routes are still registered at /. The proxy must strip the prefix
      # before forwarding, otherwise GET /phoenix/assets/*.js hits the SPA
      # catch-all (returns index.html) instead of the static-file handler
      # — manifests as a blank white page in the browser.
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        # Chart renders the Service as `<release>-svc`, hardcoded in the
        # `phoenix.service` template helper. Keep this name in sync if you
        # ever set `nameOverride` / `fullnameOverride`.
        - name: phoenix-svc
          namespace: observability
          port: 6006
