name: time-mcp-server
framework: fastmcp-python
version: 0.1.0
description: custom mcp server which shares time, date other time related things
author: George Artemiev
email: nissan547@live.com
secrets:
    local:
        enabled: false
        provider: env
        file: .env.local
    production:
        enabled: false
        provider: kubernetes
        secretName: time-mcp-server-secrets-production
        namespace: default
    staging:
        enabled: false
        provider: kubernetes
        secretName: time-mcp-server-secrets-staging
        namespace: default
created_at: 2026-05-14T17:00:07.231554+03:00
updated_at: 2026-05-14T17:00:07.266443+03:00
tools:
  convert_time:
    name: convert_time
    default_source_timezone: UTC
    default_target_timezone: Europe/Bucharest
