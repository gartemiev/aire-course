apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
# HelmRepository (type: oci) instead of OCIRepository: Flux's OCIRepository
# requires the chart layer to be a gzip-compressed tarball, which fails on
# the external-secrets chart with "requires gzip-compressed body: gzip:
# invalid header". HelmRepository handles the helm-published OCI layer
# media types correctly.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  type: oci
  interval: 1h
  url: oci://ghcr.io/external-secrets/charts
---
# The external-secrets chart bundles its CRDs (installCRDs: true) and the
# operator binary in one release. Keeping it under releases/crds/ ensures the
# CRDs (ClusterSecretStore, ExternalSecret, ...) plus the operator that
# reconciles them are both up before any consumer manifests are applied from
# releases/, since the releases-crds Kustomization runs first with wait: true.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 1h
  releaseName: external-secrets
  chart:
    spec:
      chart: external-secrets
      version: "2.4.1"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  install:
    createNamespace: false
    crds: CreateReplace
  values:
    installCRDs: true
