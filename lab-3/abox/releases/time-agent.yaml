# BYO (bring-your-own) kagent Agent. The container is the ADK time-agent
# wrapped in the A2A protocol via app/a2a_app.py (uvicorn) — kagent creates
# a Deployment+Service from spec.byo.deployment and re-exposes the agent
# through the controller at:
#   :8083/api/a2a/kagent/time-agent/.well-known/agent.json
#
# Image is built and pushed by .github/workflows/time-agent-image-lab3.yaml
# on changes under lab-3/abox/time-agent/**, tagged from
# `lab-3-time-agent-<semver>` git tags (e.g. lab-3-time-agent-0.1.0 → image
# tag 0.1.0). The image lives under the lab-3 path so future labs can publish
# their own agents without collision.
#
# Wiring:
#   - LLM goes to agentgateway /v1, which injects the real OpenAI key from
#     aire-openai-token (see openai-credentials.yaml + agentgateway-llm.yaml).
#     OPENAI_API_KEY is a placeholder; the gateway rewrites Authorization.
#   - MCP goes to agentgateway /mcp, which routes to the time-mcp Service
#     (see agentgateway-mcp.yaml + time-mcp-server.yaml).
#   - System prompt + tool rules live in app/agent.py.
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: time-agent
  namespace: kagent
spec:
  type: BYO
  description: "Agent that answers time and timezone questions using the time MCP server."
  byo:
    deployment:
      image: ghcr.io/gartemiev/aire-course/lab-3/time-agent:0.1.2
      imagePullPolicy: IfNotPresent
      env:
        - name: MODEL_PROVIDER
          value: openai
        - name: OPENAI_MODEL
          value: openai/gpt-4.1-mini
        - name: OPENAI_API_BASE
          value: http://agentgateway-external.agentgateway-system.svc.cluster.local/v1
        - name: OPENAI_API_KEY
          value: placeholder-gateway-injects-real-key
        - name: TIME_MCP_URL
          value: http://agentgateway-external.agentgateway-system.svc.cluster.local/mcp
        - name: PORT
          value: "8080"
        # Optional: extra HTTP headers added to every LLM / MCP request.
        # Use when agentgateway routes on headers (tenancy, backend tier, etc.)
        # rather than path alone. JSON dict; omit the env var entirely when no
        # extra headers are needed (current OpenAI route only matches on /v1).
        # - name: OPENAI_EXTRA_HEADERS
        #   value: '{"X-Route-Tier":"premium"}'
        # - name: MCP_EXTRA_HEADERS
        #   value: '{"X-Tenant":"acme"}'
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 1
          memory: 512Mi
