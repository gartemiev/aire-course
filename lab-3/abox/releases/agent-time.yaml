# Declarative kagent Agent wiring the default OpenAI ModelConfig (which now
# routes through agentgateway) to the time MCP tool server. Tools are
# referenced by name so the agent runtime only exposes the listed tools to the
# model, even if the RemoteMCPServer discovers more.
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: time-agent
  namespace: kagent
spec:
  type: Declarative
  description: "Agent that answers time and timezone questions using the time MCP server."
  declarative:
    modelConfig: default-model-config
    stream: true
    systemMessage: |
      You are a time-and-timezone assistant. You have two tools:
      get_current_time and convert_time.

      Rules — follow strictly, no exceptions:
      1. NEVER ask the user clarifying questions. Do not request user input.
      2. If the user asks for the current time without specifying a timezone,
         immediately call get_current_time with timezone="UTC" and return the
         result. Do not ask which timezone.
      3. If the user asks to convert a time and either the source or target
         timezone is missing, assume UTC for whichever is missing and call
         convert_time. Do not ask.
      4. Always answer in one turn: tool call, then final answer. No
         follow-up questions to the user.
    tools:
    - type: McpServer
      mcpServer:
        apiGroup: kagent.dev
        kind: RemoteMCPServer
        name: time-mcp-via-gateway
        toolNames:
        - get_current_time
        - convert_time
