# Custom time-mcp-server, declared as a kmcp MCPServer CR (kagent.dev/v1alpha1).
# The kmcp controller (bundled as a subchart of kagent) reconciles this into
# a Deployment and Service in the kagent namespace:
#   - Deployment runs spec.deployment (image/cmd/args/env/port)
#   - Service is named after metadata.name on spec.deployment.port
#
# Image is built and pushed by .github/workflows/time-mcp-image-lab3.yaml on
# changes under lab-3/abox/time-mcp-server/**, tagged from
# `lab-3-time-mcp-<semver>` git tags (e.g. lab-3-time-mcp-0.1.0 → image tag
# 0.1.0). The image lives under the lab-3 path so future labs can publish
# their own MCP servers without collision.
#
# The generated Service (time-mcp.kagent.svc.cluster.local:3000) matches the
# static target in releases/agentgateway-mcp.yaml, so the existing /mcp
# HTTPRoute reaches this server unchanged. discovery: disabled stops kmcp from
# auto-creating a RemoteMCPServer pointing at the Service directly — agents
# must go through the gateway via the explicit RemoteMCPServer below.
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: time-mcp
  namespace: kagent
  labels:
    kagent.dev/discovery: disabled # gateway-routed only; do not auto-create RemoteMCPServer
spec:
  transportType: http
  httpTransport:
    targetPort: 3000
    path: /mcp
  deployment:
    image: ghcr.io/gartemiev/aire-course/lab-3/time-mcp-server:0.1.0
    imagePullPolicy: IfNotPresent
    # Call the project's `dev-http` console script directly. It's installed
    # into /app/.venv/bin/ by `uv sync` at build time, and /app/.venv/bin is
    # on PATH per the Dockerfile. Wrapping it in `uv run` at runtime breaks
    # under the non-root mcpuser because uv tries to populate ~/.cache/uv.
    # The script forces --transport http and reads HOST/PORT from env.
    cmd: dev-http
    env:
      HOST: "0.0.0.0"
      PORT: "3000"
    port: 3000
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
---
# Agents reach this server via the shared agentgateway /mcp route, not the
# Service directly. Explicit because discovery is disabled on the MCPServer.
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: time-mcp-via-gateway
  namespace: kagent
spec:
  description: "Time tools, routed via agentgateway"
  protocol: STREAMABLE_HTTP
  url: http://agentgateway-external.agentgateway-system.svc.cluster.local/mcp
  timeout: 30s
