<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Interactive Metabase alert triage concept</title>
  <desc id="desc">High-level architecture showing custom alerts flowing to OpsGenie first, OpsGenie forwarding alerts to Slack, and the alert triage agent using agentgateway, MCP server, Metabase, databases, LLM gateway, and MCP App UI.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #0f172a;
      }
      .box {
        fill: #eff6ff;
        stroke: #2563eb;
        stroke-width: 2;
      }
      .gateway {
        fill: #ecfdf5;
        stroke: #059669;
        stroke-width: 2;
      }
      .data {
        fill: #fef3c7;
        stroke: #d97706;
        stroke-width: 2;
      }
      .ui {
        fill: #f5f3ff;
        stroke: #7c3aed;
        stroke-width: 2;
      }
      .external {
        fill: #f8fafc;
        stroke: #64748b;
        stroke-width: 2;
      }
      .line {
        stroke: #334155;
        stroke-width: 2.4;
        marker-end: url(#arrow);
        fill: none;
      }
      .label {
        font-size: 16px;
        font-weight: 650;
      }
      .small {
        font-size: 13px;
      }
    </style>
  </defs>

  <rect width="1200" height="620" fill="#ffffff"/>
  <text x="600" y="44" text-anchor="middle" font-size="28" font-weight="760">Interactive Metabase Alert Triage</text>
  <text x="600" y="72" text-anchor="middle" font-size="15" fill="#475569">MCP Apps provide a visual evidence layer between alert delivery and human decision-making</text>

  <rect class="box" x="60" y="230" width="170" height="68" rx="12"/>
  <text class="label" x="145" y="257" text-anchor="middle">Custom Alert</text>
  <text class="small" x="145" y="278" text-anchor="middle">Script</text>

  <rect class="external" x="300" y="130" width="150" height="60" rx="12"/>
  <text class="label" x="375" y="166" text-anchor="middle">OpsGenie</text>

  <rect class="external" x="300" y="330" width="150" height="60" rx="12"/>
  <text class="label" x="375" y="366" text-anchor="middle">Slack</text>

  <rect class="box" x="520" y="230" width="170" height="68" rx="12"/>
  <text class="label" x="605" y="257" text-anchor="middle">Alert Triage</text>
  <text class="small" x="605" y="278" text-anchor="middle">Agent</text>

  <rect class="gateway" x="760" y="130" width="170" height="68" rx="12"/>
  <text class="label" x="845" y="157" text-anchor="middle">MCP Gateway</text>
  <text class="small" x="845" y="178" text-anchor="middle">agentgateway</text>

  <rect class="gateway" x="760" y="330" width="170" height="68" rx="12"/>
  <text class="label" x="845" y="357" text-anchor="middle">LLM Gateway</text>
  <text class="small" x="845" y="378" text-anchor="middle">agentgateway</text>

  <rect class="box" x="1000" y="118" width="160" height="88" rx="12"/>
  <text class="label" x="1080" y="146" text-anchor="middle">Metabase</text>
  <text class="label" x="1080" y="168" text-anchor="middle">MCP Server</text>
  <text class="small" x="1080" y="188" text-anchor="middle">or custom server</text>

  <rect class="data" x="1000" y="245" width="160" height="60" rx="12"/>
  <text class="label" x="1080" y="281" text-anchor="middle">Metabase</text>

  <rect class="data" x="1000" y="345" width="160" height="70" rx="12"/>
  <text class="label" x="1080" y="373" text-anchor="middle">BigQuery /</text>
  <text class="label" x="1080" y="395" text-anchor="middle">PostgreSQL</text>

  <rect class="external" x="1000" y="470" width="160" height="60" rx="12"/>
  <text class="label" x="1080" y="506" text-anchor="middle">External LLM</text>

  <rect class="ui" x="520" y="455" width="170" height="78" rx="12"/>
  <text class="label" x="605" y="484" text-anchor="middle">MCP App UI</text>
  <text class="small" x="605" y="506" text-anchor="middle">charts, evidence,</text>
  <text class="small" x="605" y="524" text-anchor="middle">next actions</text>

  <rect class="external" x="280" y="455" width="190" height="78" rx="12"/>
  <text class="label" x="375" y="484" text-anchor="middle">Data Engineer /</text>
  <text class="label" x="375" y="506" text-anchor="middle">SRE / Ops</text>

  <path class="line" d="M230 250 C260 210, 270 170, 300 160"/>
  <path class="line" d="M375 190 L375 330"/>
  <path class="line" d="M450 360 C490 350, 515 305, 545 298"/>
  <path class="line" d="M690 245 C725 210, 735 170, 760 164"/>
  <path class="line" d="M690 282 C725 318, 735 358, 760 364"/>
  <path class="line" d="M930 164 L1000 164"/>
  <path class="line" d="M1080 206 L1080 245"/>
  <path class="line" d="M1080 305 L1080 345"/>
  <path class="line" d="M930 364 C965 390, 985 452, 1000 493"/>
  <path class="line" d="M605 298 L605 455"/>
  <path class="line" d="M520 494 L470 494"/>
</svg>
