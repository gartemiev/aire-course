<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="520" viewBox="0 0 1150 520" role="img" aria-labelledby="title desc">
  <title id="title">kagent alert triage workflow</title>
  <desc id="desc">Workflow showing an alert being normalized, enriched with Metabase data, scored, checked for freshness, explained by an LLM, rendered as an MCP App, reviewed by a human, and stored as feedback.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #0f172a;
      }
      .step {
        fill: #eff6ff;
        stroke: #2563eb;
        stroke-width: 2;
      }
      .decision {
        fill: #fef3c7;
        stroke: #d97706;
        stroke-width: 2;
      }
      .human {
        fill: #f5f3ff;
        stroke: #7c3aed;
        stroke-width: 2;
      }
      .line {
        stroke: #334155;
        stroke-width: 2.4;
        marker-end: url(#arrow);
        fill: none;
      }
      .label {
        font-size: 15px;
        font-weight: 650;
      }
      .small {
        font-size: 12px;
        fill: #475569;
      }
    </style>
  </defs>

  <rect width="1150" height="520" fill="#ffffff"/>
  <text x="575" y="42" text-anchor="middle" font-size="28" font-weight="760">kagent-Based Alert Triage Workflow</text>
  <text x="575" y="70" text-anchor="middle" font-size="15" fill="#475569">The agent collects deterministic evidence, asks the LLM for explanation, and renders an MCP App for human review</text>

  <rect class="step" x="55" y="135" width="140" height="72" rx="12"/>
  <text class="label" x="125" y="164" text-anchor="middle">Alert</text>
  <text class="label" x="125" y="185" text-anchor="middle">received</text>

  <rect class="step" x="250" y="135" width="150" height="72" rx="12"/>
  <text class="label" x="325" y="163" text-anchor="middle">Normalize</text>
  <text class="label" x="325" y="184" text-anchor="middle">metadata</text>

  <rect class="step" x="455" y="135" width="160" height="72" rx="12"/>
  <text class="label" x="535" y="163" text-anchor="middle">Fetch</text>
  <text class="label" x="535" y="184" text-anchor="middle">Metabase data</text>

  <rect class="decision" x="675" y="135" width="160" height="72" rx="12"/>
  <text class="label" x="755" y="163" text-anchor="middle">Calculate</text>
  <text class="label" x="755" y="184" text-anchor="middle">anomaly score</text>

  <rect class="decision" x="895" y="135" width="170" height="72" rx="12"/>
  <text class="label" x="980" y="163" text-anchor="middle">Check pipeline</text>
  <text class="label" x="980" y="184" text-anchor="middle">freshness</text>

  <rect class="step" x="250" y="310" width="160" height="72" rx="12"/>
  <text class="label" x="330" y="338" text-anchor="middle">Ask LLM for</text>
  <text class="label" x="330" y="359" text-anchor="middle">explanation</text>

  <rect class="human" x="475" y="310" width="150" height="72" rx="12"/>
  <text class="label" x="550" y="338" text-anchor="middle">Render</text>
  <text class="label" x="550" y="359" text-anchor="middle">MCP App</text>

  <rect class="human" x="690" y="310" width="150" height="72" rx="12"/>
  <text class="label" x="765" y="338" text-anchor="middle">Human</text>
  <text class="label" x="765" y="359" text-anchor="middle">reviews</text>

  <rect class="step" x="905" y="310" width="160" height="72" rx="12"/>
  <text class="label" x="985" y="338" text-anchor="middle">Feedback</text>
  <text class="label" x="985" y="359" text-anchor="middle">stored</text>

  <path class="line" d="M195 171 L250 171"/>
  <path class="line" d="M400 171 L455 171"/>
  <path class="line" d="M615 171 L675 171"/>
  <path class="line" d="M835 171 L895 171"/>
  <path class="line" d="M980 207 C980 260, 410 260, 350 310"/>
  <path class="line" d="M410 346 L475 346"/>
  <path class="line" d="M625 346 L690 346"/>
  <path class="line" d="M840 346 L905 346"/>

  <text class="small" x="575" y="448" text-anchor="middle">First version remains read-only and advisory-only. Mutable actions require explicit human approval.</text>
</svg>
