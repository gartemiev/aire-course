<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760" role="img" aria-labelledby="title desc">
  <title id="title">MCP Apps sequence flow</title>
  <desc id="desc">Sequence diagram showing a user, agent, MCP App iframe, and MCP server exchanging tool calls, tool results, fresh data, and context updates.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-light" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      text {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #0f172a;
      }
      .participant {
        fill: #eef2ff;
        stroke: #6366f1;
        stroke-width: 2;
      }
      .lifeline {
        stroke: #94a3b8;
        stroke-width: 2;
        stroke-dasharray: 7 7;
      }
      .message {
        stroke: #334155;
        stroke-width: 2.4;
        marker-end: url(#arrow);
      }
      .return {
        stroke: #64748b;
        stroke-width: 2.2;
        stroke-dasharray: 7 6;
        marker-end: url(#arrow-light);
      }
      .note {
        fill: #fef9c3;
        stroke: #eab308;
        stroke-width: 1.5;
      }
      .label {
        font-size: 18px;
        font-weight: 650;
      }
      .message-label {
        font-size: 16px;
      }
      .note-label {
        font-size: 15px;
        font-weight: 600;
      }
    </style>
  </defs>

  <rect width="1100" height="760" fill="#ffffff"/>
  <text x="550" y="48" text-anchor="middle" font-size="30" font-weight="750">MCP Apps Flow</text>
  <text x="550" y="76" text-anchor="middle" font-size="16" fill="#475569">Interactive apps render inside the host while tool calls continue through MCP</text>

  <rect class="participant" x="70" y="112" width="160" height="54" rx="12"/>
  <text class="label" x="150" y="146" text-anchor="middle">User</text>

  <rect class="participant" x="325" y="112" width="160" height="54" rx="12"/>
  <text class="label" x="405" y="146" text-anchor="middle">Agent</text>

  <rect class="participant" x="580" y="112" width="200" height="54" rx="12"/>
  <text class="label" x="680" y="146" text-anchor="middle">MCP App iframe</text>

  <rect class="participant" x="875" y="112" width="180" height="54" rx="12"/>
  <text class="label" x="965" y="146" text-anchor="middle">MCP Server</text>

  <line class="lifeline" x1="150" y1="166" x2="150" y2="700"/>
  <line class="lifeline" x1="405" y1="166" x2="405" y2="700"/>
  <line class="lifeline" x1="680" y1="166" x2="680" y2="700"/>
  <line class="lifeline" x1="965" y1="166" x2="965" y2="700"/>

  <line class="message" x1="150" y1="210" x2="395" y2="210"/>
  <text class="message-label" x="272" y="198" text-anchor="middle">"show me analytics"</text>

  <rect class="note" x="95" y="236" width="640" height="42" rx="8"/>
  <text class="note-label" x="415" y="263" text-anchor="middle">Interactive app rendered in chat</text>

  <line class="message" x1="405" y1="316" x2="955" y2="316"/>
  <text class="message-label" x="680" y="304" text-anchor="middle">tools/call</text>

  <line class="return" x1="965" y1="366" x2="415" y2="366"/>
  <text class="message-label" x="690" y="354" text-anchor="middle">tool input/result</text>

  <line class="message" x1="405" y1="416" x2="670" y2="416"/>
  <text class="message-label" x="538" y="404" text-anchor="middle">tool result pushed to app</text>

  <line class="message" x1="150" y1="466" x2="670" y2="466"/>
  <text class="message-label" x="410" y="454" text-anchor="middle">user interacts</text>

  <line class="message" x1="680" y1="516" x2="415" y2="516"/>
  <text class="message-label" x="548" y="504" text-anchor="middle">tools/call request</text>

  <line class="message" x1="405" y1="566" x2="955" y2="566"/>
  <text class="message-label" x="680" y="554" text-anchor="middle">tools/call forwarded</text>

  <line class="return" x1="965" y1="616" x2="415" y2="616"/>
  <text class="message-label" x="690" y="604" text-anchor="middle">fresh data</text>

  <line class="message" x1="405" y1="666" x2="670" y2="666"/>
  <text class="message-label" x="538" y="654" text-anchor="middle">fresh data</text>

  <rect class="note" x="95" y="690" width="640" height="42" rx="8"/>
  <text class="note-label" x="415" y="717" text-anchor="middle">App updates with new data</text>

  <line class="return" x1="680" y1="742" x2="415" y2="742"/>
  <text class="message-label" x="548" y="730" text-anchor="middle">context update</text>
</svg>
