apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 1h
  url: oci://ghcr.io/external-secrets/charts/external-secrets
  ref:
    tag: "2.4.1"
---
# The external-secrets chart bundles its CRDs (installCRDs: true) and the
# operator binary in one release. Keeping it under releases/crds/ ensures the
# CRDs (ClusterSecretStore, ExternalSecret, ...) plus the operator that
# reconciles them are both up before any consumer manifests are applied from
# releases/, since the releases-crds Kustomization runs first with wait: true.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 1h
  releaseName: external-secrets
  chartRef:
    kind: OCIRepository
    name: external-secrets
    namespace: flux-system
  install:
    createNamespace: false
    crds: CreateReplace
  values:
    installCRDs: true
