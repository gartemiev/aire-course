# OpenAI API key pulled from GCP Secret Manager via External Secrets Operator,
# materialized as `aire-openai-token` in agentgateway-system. The
# AgentgatewayBackend in agentgateway-llm.yaml consumes this secret to inject
# the Authorization header on every upstream call to api.openai.com.
#
# Prerequisite (out-of-band, identical to lab-1):
#   1. Create GCP service account "external-secrets@<project>.iam.gserviceaccount.com"
#      with role roles/secretmanager.secretAccessor on the OpenAI secret.
#   2. Generate a JSON key and load it into the cluster as:
#         kubectl -n external-secrets create secret generic gcp-sa-key \
#           --from-file=key.json=/path/to/key.json
#   3. Store the raw OpenAI key in GCP Secret Manager under the name
#      `aire_openai_token` in the project referenced below.
#
# Without these prerequisites the ExternalSecret stays in SecretSyncError
# while everything else still reconciles.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secrets-manager
spec:
  provider:
    gcpsm:
      projectID: heorhii-artemiev-test-project
      auth:
        secretRef:
          secretAccessKeySecretRef:
            name: gcp-sa-key
            namespace: external-secrets
            key: key.json
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aire-openai-token
  namespace: agentgateway-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secrets-manager
    kind: ClusterSecretStore
  target:
    name: aire-openai-token
    creationPolicy: Owner
    template:
      data:
        Authorization: "Bearer {{ .api_key }}"
  data:
    - secretKey: api_key
      remoteRef:
        key: aire_openai_token
