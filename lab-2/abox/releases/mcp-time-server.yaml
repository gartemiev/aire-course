# Declarative MCP tool server: the kmcp controller materializes the MCPServer
# CR into a Deployment + Service. The pod runs the agentgateway adapter as the
# entrypoint; the adapter spawns `mcp-server-time` as a stdio child process
# and exposes it as Streamable HTTP on :3000/mcp.
#
# Under kagent 0.9.2 the MCPServerToolController reliably auto-creates the
# matching RemoteMCPServer once the deployment is ready, so we declare only
# the MCPServer here. (0.7.23 needed both declared explicitly to avoid a
# startup race — that workaround is dropped with the version bump.)
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: time-mcp
  namespace: kagent
spec:
  transportType: stdio
  stdioTransport: {}
  deployment:
    image: mcp/time
    cmd: "mcp-server-time"
    port: 3000
