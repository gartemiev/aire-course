# Declarative MCP tool server: the kmcp controller materializes the MCPServer
# CR into a Deployment + Service. The pod runs the agentgateway adapter as the
# entrypoint; the adapter spawns `mcp-server-time` as a stdio child process and
# exposes it as Streamable HTTP on :3000/mcp.
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: time-mcp
  namespace: kagent
spec:
  transportType: stdio
  stdioTransport: {}
  deployment:
    image: mcp/time
    cmd: "mcp-server-time"
    port: 3000
---
# Explicit RemoteMCPServer registers the MCPServer's Service URL with the
# kagent controller so the tool catalogue is populated and Agents can reference
# `get_current_time` / `convert_time`. kagent 0.7.23 also has a
# MCPServerToolController that would create this RemoteMCPServer
# automatically, but it gives up after the initial connection-refused window
# while the pod is still starting and does not retry until the spec changes.
# Declaring the RemoteMCPServer here makes the wiring idempotent under GitOps.
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: time-mcp
  namespace: kagent
spec:
  description: "Time and timezone tools (mcp/time)"
  protocol: STREAMABLE_HTTP
  url: http://time-mcp.kagent:3000/mcp
  timeout: 30s
