name: Push lab-3 releases as OCI artifact

on:
  push:
    tags:
      - 'lab4-v*'

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OCI artifact
        id: push
        run: |
          TAG=${GITHUB_REF_NAME#lab4-v}
          digest=$(flux push artifact oci://ghcr.io/${{ github.repository }}/releases-lab4:${TAG} \
            --path="./lab-4/abox/releases" \
            --source="${{ github.repositoryUrl }}" \
            --revision="${{ github.ref_name }}@sha1:${{ github.sha }}" \
            --output json | jq -r '.digest')
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "digest=${digest}" >> $GITHUB_OUTPUT

      - name: Tag artifact
        run: |
          flux tag artifact \
            oci://ghcr.io/${{ github.repository }}/releases-lab4:${{ steps.push.outputs.tag }}@${{ steps.push.outputs.digest }} \
            --tag latest
