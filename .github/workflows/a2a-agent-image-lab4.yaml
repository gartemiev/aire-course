name: Build lab-4 a2a-agent image

# Two modes:
#   - push to main touching the agent: build only (sanity check, no GHCR push)
#   - push of a `lab-4-a2a-agent-<semver>` tag: build AND push semver image to GHCR
#   - workflow_dispatch: build only (use a tag to publish)
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'lab-4/agent/**'
      - '.github/workflows/a2a-agent-image-lab4.yaml'
    tags:
      - 'lab-4-a2a-agent-*'

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (only when publishing)
        if: startsWith(github.ref, 'refs/tags/lab-4-a2a-agent-')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          # Lab-scoped path so future labs can publish their own agents under
          # aire-course/lab-N/<name> without collision.
          images: ghcr.io/${{ github.repository }}/lab-4/a2a-agent
          tags: |
            type=match,pattern=lab-4-a2a-agent-(\d+\.\d+\.\d+),group=1

      - uses: docker/build-push-action@v6
        with:
          context: ./lab-4/agent
          # Multi-arch: KinD on Apple Silicon needs linux/arm64; CI runners
          # are linux/amd64. Single-arch builds fail pull with "no match for
          # platform in manifest" on the mismatched node.
          platforms: linux/amd64,linux/arm64
          # Push only on a release tag. Branch pushes and workflow_dispatch
          # build the image locally to verify the Dockerfile, then discard it.
          push: ${{ startsWith(github.ref, 'refs/tags/lab-4-a2a-agent-') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            AGENT_VERSION=${{ github.ref_name }}
